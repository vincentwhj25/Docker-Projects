name: Docker CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  docker-build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t my-nginx:v2 ./docker-lab

      - name: Show Docker images
        run: docker images

      - name: Test container starts
        run: |
          docker run -d --name testing-web -p 8082:80 my-nginx:v2
          sleep 3
          docker ps
          docker stop testing-web
          docker rm testing-web
